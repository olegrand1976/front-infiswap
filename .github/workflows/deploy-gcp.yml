name: Deploy GCP staging (web only)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-infiswap-gcp
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: premedica-prod-2025
  GCP_RUN_REGION: europe-west9
  WEB_PUBLIC_URL: https://infiswap.ll-it-sc.be
  API_PUBLIC_URL: https://api-infiswap.ll-it-sc.be
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/237481297060/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_SERVICE_ACCOUNT: github-infiswap-deploy@premedica-prod-2025.iam.gserviceaccount.com

jobs:
  deploy:
    name: Cloud Build → Infiswap web staging
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout front
        uses: actions/checkout@v4

      - name: Checkout back
        uses: actions/checkout@v4
        with:
          repository: olegrand1976/back-infiswap
          path: back-infiswap
          token: ${{ secrets.GH_PAT }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy web only
        run: |
          cd back-infiswap
          ln -sfn "${GITHUB_WORKSPACE}" front-infiswap
          chmod +x infra/gcp/*.sh infra/gcp/lib/*.sh 2>/dev/null || true
          ./infra/gcp/deploy-staging.sh --web-only

      - name: Summary
        run: |
          WEB_URL="$(gcloud run services describe infiswap-web-staging \
            --region="${GCP_RUN_REGION}" --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)' 2>/dev/null || true)"
          echo "Web déployé : ${WEB_PUBLIC_URL} (Run: ${WEB_URL})" >> "${GITHUB_STEP_SUMMARY}"
