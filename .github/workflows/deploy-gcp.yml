name: Deploy GCP

# Front → Artifact Registry → Cloud Run (sans Docker Hub).
# Staging : branche staging. Prod web-only : branche main.
# Déploiement API+Web prod complet : back-infiswap (deploy-prod-gcp.yml).
on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target:
        description: Environnement cible
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
      skip_baseline:
        description: Ignorer baseline pre-deploy (recovery)
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-front-gcp-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: premedica-prod-2025
  GCP_RUN_REGION: europe-west9
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/237481297060/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_SERVICE_ACCOUNT: github-infiswap-deploy@premedica-prod-2025.iam.gserviceaccount.com

jobs:
  resolve-env:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.env.outputs.target }}
      gate_ref: ${{ steps.env.outputs.gate_ref }}
      front_branch: ${{ steps.env.outputs.front_branch }}
      cloudbuild_config: ${{ steps.env.outputs.cloudbuild_config }}
      web_service: ${{ steps.env.outputs.web_service }}
      web_public_url: ${{ steps.env.outputs.web_public_url }}
      skip_baseline: ${{ steps.env.outputs.skip_baseline }}
    steps:
      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
            skip_baseline="${{ github.event.inputs.skip_baseline }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            target="prod"
            skip_baseline="false"
          else
            target="staging"
            skip_baseline="false"
          fi
          case "$target" in
            prod)
              gate_ref="main"
              echo "cloudbuild_config=infra/gcp/cloudbuild-prod-web-only.yaml" >> "$GITHUB_OUTPUT"
              echo "web_service=infiswap-web-prod" >> "$GITHUB_OUTPUT"
              echo "web_public_url=https://infiswap.be" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              gate_ref="staging"
              echo "cloudbuild_config=infra/gcp/cloudbuild-web-only.yaml" >> "$GITHUB_OUTPUT"
              echo "web_service=infiswap-web-staging" >> "$GITHUB_OUTPUT"
              echo "web_public_url=https://infiswap.ll-it-sc.be" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Cible inconnue: $target"
              exit 1
              ;;
          esac
          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "gate_ref=${gate_ref}" >> "$GITHUB_OUTPUT"
          echo "front_branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          echo "skip_baseline=${skip_baseline}" >> "$GITHUB_OUTPUT"

  quality-gate:
    name: Quality gate
    needs: resolve-env
    uses: olegrand1976/back-infiswap/.github/workflows/quality-gate.yml@${{ needs.resolve-env.outputs.gate_ref }}
    with:
      environment: ${{ needs.resolve-env.outputs.target }}
      front_branch: ${{ needs.resolve-env.outputs.front_branch }}
      skip_baseline: ${{ needs.resolve-env.outputs.skip_baseline == 'true' }}

  deploy:
    name: Cloud Build → front GCP
    needs: [resolve-env, quality-gate]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout front
        uses: actions/checkout@v4

      - name: Validate Cloud Build context
        run: |
          test -f Dockerfile.cloudrun.web
          test -f "${{ needs.resolve-env.outputs.cloudbuild_config }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy via Cloud Build
        run: |
          gcloud builds submit \
            --project="${GCP_PROJECT_ID}" \
            --config="${{ needs.resolve-env.outputs.cloudbuild_config }}"

      - name: Summary
        run: |
          WEB_URL="$(gcloud run services describe "${{ needs.resolve-env.outputs.web_service }}" \
            --region="${GCP_RUN_REGION}" --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)' 2>/dev/null || true)"
          {
            echo "### Front GCP (${{ needs.resolve-env.outputs.web_service }})"
            echo ""
            echo "| | URL |"
            echo "|---|-----|"
            echo "| Custom | ${{ needs.resolve-env.outputs.web_public_url }} |"
            echo "| Cloud Run | ${WEB_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
