name: Deploy GCP

# Front → Artifact Registry → Cloud Run (sans Docker Hub).
# Staging : branche staging. Prod web-only : branche main.
# Déploiement API+Web prod complet : back-infiswap (deploy-prod-gcp.yml).
on:
  push:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target:
        description: Environnement cible
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod

concurrency:
  group: deploy-front-gcp-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: premedica-prod-2025
  GCP_RUN_REGION: europe-west9
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/237481297060/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  GCP_SERVICE_ACCOUNT: github-infiswap-deploy@premedica-prod-2025.iam.gserviceaccount.com
  BACK_REPO: olegrand1976/back-infiswap

jobs:
  deploy:
    name: Cloud Build → front GCP
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            target="prod"
          else
            target="staging"
          fi
          case "$target" in
            prod)
              echo "back_ref=main" >> "$GITHUB_OUTPUT"
              echo "cloudbuild_config=infra/gcp/cloudbuild-prod-web-only.yaml" >> "$GITHUB_OUTPUT"
              echo "web_service=infiswap-web-prod" >> "$GITHUB_OUTPUT"
              echo "web_public_url=https://infiswap.be" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "back_ref=staging" >> "$GITHUB_OUTPUT"
              echo "cloudbuild_config=infra/gcp/cloudbuild-web-only.yaml" >> "$GITHUB_OUTPUT"
              echo "web_service=infiswap-web-staging" >> "$GITHUB_OUTPUT"
              echo "web_public_url=https://infiswap.ll-it-sc.be" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Cible inconnue: $target"
              exit 1
              ;;
          esac

      - name: Checkout front
        uses: actions/checkout@v4

      - name: Checkout back (infra Cloud Build)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACK_REPO }}
          ref: ${{ steps.env.outputs.back_ref }}
          path: back-infiswap

      - name: Sync front into Cloud Build context
        run: |
          rsync -a --delete \
            --exclude node_modules \
            --exclude .output \
            --exclude .nuxt \
            --exclude .git \
            ./ back-infiswap/front-infiswap/
          test -f back-infiswap/front-infiswap/Dockerfile.cloudrun.web
          test -f "back-infiswap/${{ steps.env.outputs.cloudbuild_config }}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy via Cloud Build
        working-directory: back-infiswap
        run: |
          gcloud builds submit \
            --project="${GCP_PROJECT_ID}" \
            --config="${{ steps.env.outputs.cloudbuild_config }}"

      - name: Summary
        run: |
          WEB_URL="$(gcloud run services describe "${{ steps.env.outputs.web_service }}" \
            --region="${GCP_RUN_REGION}" --project="${GCP_PROJECT_ID}" \
            --format='value(status.url)' 2>/dev/null || true)"
          {
            echo "### Front GCP (${{ steps.env.outputs.web_service }})"
            echo ""
            echo "| | URL |"
            echo "|---|-----|"
            echo "| Custom | ${{ steps.env.outputs.web_public_url }} |"
            echo "| Cloud Run | ${WEB_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
