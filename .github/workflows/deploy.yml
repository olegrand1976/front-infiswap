name: Deploy OVH (legacy - manuel)

# Prod migree vers GCP : le front prod est construit par le back (cloudbuild-prod.yaml).
# Conserve uniquement pour redeploiement OVH manuel ponctuel.
on:
  workflow_dispatch:

env:
  IMAGE_NAME: front-app
  DEPLOY_PATH: /srv/front
  DOCKER_COMPOSE_FILE: docker-compose.prod.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] && missing+=("DOCKERHUB_USERNAME")
          [ -z "${{ secrets.DOCKERHUB_PASSWORD }}" ] && missing+=("DOCKERHUB_PASSWORD")
          [ -z "${{ secrets.API_URL }}" ] && missing+=("API_URL")
          [ -z "${{ secrets.FRONT_END_URL }}" ] && missing+=("FRONT_END_URL")
          [ -z "${{ secrets.PORT }}" ] && missing+=("PORT")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets GitHub Actions manquants : ${missing[*]}"
            echo "Configurer dans Settings → Secrets and variables → Actions (voir .github/SECRETS.md)."
            exit 1
          fi

      - name: Generate runtime .env
        run: |
          cat > .env << EOF
          NODE_ENV=production
          API_URL=${{ secrets.API_URL }}
          FRONT_END_URL=${{ secrets.FRONT_END_URL }}
          PORT=${{ secrets.PORT }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EOF

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install and build
        env:
          NODE_OPTIONS: --max_old_space_size=4096
        run: |
          npm install --include=dev
          npm run build

      - name: Create Dockerfile for pre-built output
        run: |
          cat > Dockerfile.temp << 'EOF'
          FROM node:20.18.0-slim
          WORKDIR /app
          COPY .output ./.output
          COPY package.json ./package.json
          COPY .env .env
          ENV NODE_ENV=production
          ENV PORT=3000
          EXPOSE 3000
          CMD ["node", ".output/server/index.mjs"]
          EOF

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.temp
          push: true
          tags: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/front-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          missing=()
          [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] && missing+=("DOCKERHUB_USERNAME")
          [ -z "${{ secrets.DOCKERHUB_PASSWORD }}" ] && missing+=("DOCKERHUB_PASSWORD")
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && missing+=("SSH_PRIVATE_KEY")
          [ -z "${{ secrets.SSH_HOST }}" ] && missing+=("SSH_HOST")
          [ -z "${{ secrets.SSH_USER }}" ] && missing+=("SSH_USER")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets GitHub Actions manquants : ${missing[*]}"
            echo "Configurer dans Settings → Secrets and variables → Actions (voir .github/SECRETS.md)."
            exit 1
          fi

      - name: Prepare SSH key and known hosts
        run: |
          install -m 600 /dev/null id_rsa
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          install -m 644 /dev/null known_hosts
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > known_hosts
          fi
          ssh-keyscan -t ed25519,rsa "${{ secrets.SSH_HOST }}" >> known_hosts 2>/dev/null || true

      - name: Substitute Docker Hub username in compose file
        run: |
          sed "s|\${DOCKERHUB_USERNAME}|${{ secrets.DOCKERHUB_USERNAME }}|g" \
            "${{ env.DOCKER_COMPOSE_FILE }}" > docker-compose.temp.yml

      - name: Copy docker-compose to server
        run: |
          scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes \
            docker-compose.temp.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.prod.yml"

      - name: Deploy on server
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "$DOCKERHUB_PASSWORD" | ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" "docker login -u '${DOCKERHUB_USERNAME}' --password-stdin"

          ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" "
              docker pull docker.io/${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}:latest &&
              docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.prod.yml down || true &&
              docker stop infiswap_frontend || true &&
              docker rm infiswap_frontend || true &&
              docker compose -f ${{ env.DEPLOY_PATH }}/docker-compose.prod.yml up -d
            "
