stages:
  - build
  - deploy

#####################################
# Job de Build
#####################################
build:
  stage: build
  image: node:20                   # Utilise Node.js pour disposer de npm
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375  # Redirige le client Docker vers le service dind
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # Installation de Docker CLI dans l'image node (node:20 ne contient pas Docker par défaut)
    - apt-get update && apt-get install -y docker.io
    # Attente de la résolution DNS pour "docker"
    - echo "Attente de la résolution DNS pour 'docker'..."
    - until getent hosts docker; do echo "En attente de 'docker'..."; sleep 1; done
  script:
    - npm install
    - npm run build
    # Construction de l'image avec le tag complet
    - docker build -t docker.io/$DOCKERHUB_USERNAME/front-app:latest .
    # Connexion à Docker Hub et push de l'image
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push docker.io/$DOCKERHUB_USERNAME/front-app:latest
    - docker images
  only:
    - main

#####################################
# Déploiement sur FRONT1
#####################################
deploy_front1:
  stage: deploy
  image: docker:20.10.16           # Image contenant la CLI Docker (basée sur Alpine)
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajout de la clé SSH de localhost dans known_hosts (puisque le runner est sur FRONT1)
    - ssh-keyscan -t ed25519 localhost >> known_hosts
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    # Récupération de l'image depuis Docker Hub
    - docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest
    # Connexion SSH sur localhost pour déployer via docker-compose
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@localhost "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest &&
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main

#####################################
# Déploiement sur FRONT2
#####################################
deploy_front2:
  stage: deploy
  image: docker:20.10.16
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Vérifie et ajoute la clé SSH de FRONT2
    - if [ -n "$SSH_HOST_FRONT2" ]; then ssh-keyscan -t ed25519 $SSH_HOST_FRONT2 >> known_hosts; else echo "SSH_HOST_FRONT2 is not set"; fi
    # Vérifie et ajoute également la clé SSH de FRONT1 (pour récupérer .env.production)
    - if [ -n "$SSH_HOST_FRONT1" ]; then ssh-keyscan -t ed25519 $SSH_HOST_FRONT1 >> known_hosts; else echo "SSH_HOST_FRONT1 is not set"; fi
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    # Récupération de l'image depuis Docker Hub
    - docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest
    # Connexion SSH sur FRONT2 pour récupérer l'image
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT2 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest
      "
    # Récupération du fichier .env.production depuis FRONT1 et copie sur FRONT2
    - scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT1:/srv/front/.env.production .env.production
    - scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes .env.production $SSH_USER@$SSH_HOST_FRONT2:/srv/front/.env.production
    # Déploiement via docker-compose sur FRONT2
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT2 "
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main
  needs:
    - deploy_front1
