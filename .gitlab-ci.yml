stages:
  - build
  - deploy

build:
  stage: build
  image: node:20-alpine
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    DOCKER_API_VERSION: "1.43"
    NODE_ENV: production
  cache:
    key: "$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
      - .npm/
  before_script:
    - apk add --no-cache docker-cli bash python3 build-base git curl
    - |
      cat > .env << EOF
      NODE_ENV=${NODE_ENV}
      API_URL=${API_URL}
      FRONT_END_URL=${FRONT_END_URL}
      PORT=${PORT}
      OPENAI_API_KEY=${OPENAI_API_KEY}
      EOF
  script:
    - if [ -z "$DOCKERHUB_USERNAME" ]; then echo "DOCKERHUB_USERNAME is not set"; exit 1; fi
    - if [ -z "$DOCKERHUB_PASSWORD" ]; then echo "DOCKERHUB_PASSWORD is not set"; exit 1; fi
    - rm -rf node_modules
    # Important: Tailwind 4 a besoin des devDependencies pour builder
    - npm install --include=dev
    # On limite à 4GB pour la stabilité du runner
    - export NODE_OPTIONS=--max_old_space_size=4096
    - npm run build
    # Créer un Dockerfile qui utilise le build déjà fait et injecte le .env
    - |
      cat > Dockerfile.temp << 'EOF'
      FROM node:20.18.0-slim
      WORKDIR /app
      COPY .output ./.output
      COPY package.json ./package.json
      # On rajoute le .env généré pour le runtime
      COPY .env .env
      ENV NODE_ENV=production
      ENV PORT=3000
      EXPOSE 3000
      CMD ["node", ".output/server/index.mjs"]
      EOF
    - docker build -f Dockerfile.temp --pull -t docker.io/$DOCKERHUB_USERNAME/front-app:latest .
    - echo -n "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - docker push docker.io/$DOCKERHUB_USERNAME/front-app:latest
    - docker images
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        IMAGE_NAME: "front-app"
    - if: '$CI_COMMIT_BRANCH == "staging"'
      variables:
        IMAGE_NAME: "front-app-staging"

#####################################
# Déploiement sur FRONT1
#####################################
deploy_front1:
  stage: deploy
  image: docker:24
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - if [ -z "$DOCKERHUB_USERNAME" ]; then echo "DOCKERHUB_USERNAME is not set"; exit 1; fi
    - if [ -z "$DOCKERHUB_PASSWORD" ]; then echo "DOCKERHUB_PASSWORD is not set"; exit 1; fi
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajoute la clé SSH de FRONT1 (IP_FRONT_1 doit être défini avec l'adresse IP accessible)
    - if [ -n "$SSH_HOST" ]; then ssh-keyscan -t ed25519 $SSH_HOST >> known_hosts; else echo "SSH_HOST is not set"; fi
    # Substituer DOCKERHUB_USERNAME dans le fichier docker-compose avant de le copier
    - sed "s|\${DOCKERHUB_USERNAME}|$DOCKERHUB_USERNAME|g" $DOCKER_COMPOSE_FILE > docker-compose.temp.yml
  script:
    # Copier le fichier docker-compose approprié sur le serveur (avec DOCKERHUB_USERNAME substitué)
    - >
      scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes docker-compose.temp.yml $SSH_USER@$SSH_HOST:$DEPLOY_PATH/docker-compose.prod.yml
    # Connexion SSH sur FRONT1 pour déployer via docker-compose
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull docker.io/$IMAGE_REPO:latest &&
        docker compose -f $DEPLOY_PATH/docker-compose.prod.yml down || true &&
        docker stop infiswap_frontend || true &&
        docker rm infiswap_frontend || true &&
        docker compose -f $DEPLOY_PATH/docker-compose.prod.yml up -d
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_PATH: "/srv/front"
        IMAGE_REPO: "${DOCKERHUB_USERNAME}/front-app"
        DOCKER_COMPOSE_FILE: "docker-compose.prod.yml"
    - if: '$CI_COMMIT_BRANCH == "staging"'
      variables:
        DEPLOY_PATH: "/srv/test-front"
        IMAGE_REPO: "${DOCKERHUB_USERNAME}/front-app-staging"
        DOCKER_COMPOSE_FILE: "docker-compose.prod.staging.yml"
