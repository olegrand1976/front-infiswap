stages:
  - build
  - deploy

#####################################
# Job de Build
#####################################
build:
  stage: build
  image: node:20                   # Utilise Node.js pour disposer de npm
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375  # Redirige le client Docker vers le service dind
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # Installation de la CLI Docker dans l'image node (node:20 ne contient pas Docker par défaut)
    - apt-get update && apt-get install -y docker.io
  script:
    - npm install
    - npm run build
    - docker build -t mydockerhubusername/front-app:latest .
  only:
    - main

#####################################
# Déploiement sur FRONT1
#####################################
deploy_front1:
  stage: deploy
  image: docker:20.10.16           # Image contenant la CLI Docker (basée sur Alpine)
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375  # Nécessaire pour que le client Docker se connecte au service dind
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajoute la clé de l'hôte FRONT1 (la variable SSH_HOST_FRONT1 doit être définie dans vos variables GitLab)
    - ssh-keyscan -t ed25519 $SSH_HOST_FRONT1 >> known_hosts
  script:
    # Authentification sur Docker Hub et push de l'image construite
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push mydockerhubusername/front-app:latest
    # Sur FRONT1 : login Docker, pull de l'image et déploiement via docker-compose
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT1 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull mydockerhubusername/front-app:latest &&
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main

#####################################
# Déploiement sur FRONT2
#####################################
deploy_front2:
  stage: deploy
  image: docker:20.10.16
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375  # Pour la connexion au service dind
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajoute la clé de l'hôte FRONT2 (la variable SSH_HOST_FRONT2 doit être définie dans vos variables GitLab)
    - ssh-keyscan -t ed25519 $SSH_HOST_FRONT2 >> known_hosts
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push mydockerhubusername/front-app:latest
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT2 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull mydockerhubusername/front-app:latest &&
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main
  needs:
    - deploy_front1