stages:
  - build
  - deploy

#####################################
# Job de Build
#####################################
build:
  stage: build
  image: node:20                   # Utilise Node.js pour disposer de npm
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375  # Redirige le client Docker vers le service dind
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # Installation de la CLI Docker dans l'image node (node:20 ne contient pas Docker par défaut)
    - apt-get update && apt-get install -y docker.io
    # Attente de la résolution DNS pour "docker"
    - echo "Attente de la résolution DNS pour 'docker'..."
    - until getent hosts docker; do echo "En attente de 'docker'..."; sleep 1; done
  script:
    - npm install
    - npm run build
    - docker build -t $DOCKERHUB_USERNAME/front-app:latest .
  only:
    - main

#####################################
# Déploiement sur FRONT1
#####################################
deploy_front1:
  stage: deploy
  image: docker:20.10.16           # Image contenant la CLI Docker (basée sur Alpine)
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajout de la clé SSH de FRONT1 dans known_hosts
    - ssh-keyscan -t ed25519 $SSH_HOST_FRONT1 >> known_hosts
  script:
    # Authentification sur Docker Hub et push de l'image construite
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push $DOCKERHUB_USERNAME/front-app:latest
    # Sur FRONT1 : connexion via SSH, login Docker, pull de l'image et déploiement via docker-compose
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT1 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull $DOCKERHUB_USERNAME/front-app:latest &&
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main

#####################################
# Déploiement sur FRONT2
#####################################
deploy_front2:
  stage: deploy
  image: docker:20.10.16
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajout de la clé SSH de FRONT2 dans known_hosts
    - ssh-keyscan -t ed25519 $SSH_HOST_FRONT2 >> known_hosts
    # Ajout de la clé SSH de FRONT1 pour récupérer le fichier .env.production
    - ssh-keyscan -t ed25519 $SSH_HOST_FRONT1 >> known_hosts
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push $DOCKERHUB_USERNAME/front-app:latest
    # Sur FRONT2 : connexion via SSH, login Docker et pull de l'image
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT2 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull $DOCKERHUB_USERNAME/front-app:latest
      "
    # Récupérer le fichier .env.production depuis FRONT1
    - scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT1:/srv/front/.env.production .env.production
    # Copier le fichier .env.production sur FRONT2 (au même emplacement)
    - scp -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes .env.production $SSH_USER@$SSH_HOST_FRONT2:/srv/front/.env.production
    # Déploiement via docker-compose sur FRONT2
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$SSH_HOST_FRONT2 "
        docker-compose -f /srv/front/docker-compose.prod.yml down &&
        docker-compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main
  needs:
    - deploy_front1
