stages:
  - build
  - deploy

#####################################
# Job de Build
#####################################
build:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--tls=false"]
  variables:
    DDOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
    NODE_ENV: production
  cache:
    key: "$CI_PROJECT_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - node_modules/
      - .npm/
  before_script:
    - apk update
    - apk add --no-cache nodejs npm
    - if [ -z "$DOCKERHUB_USERNAME" ]; then echo "DOCKERHUB_USERNAME is not set"; exit 1; fi
    - rm -rf node_modules
    - if [ ! -f package-lock.json ]; then npm install --package-lock-only; fi
    - npm install
    - export NODE_OPTIONS=--max_old_space_size=8192
    - npm run build
    - docker build -t docker.io/$DOCKERHUB_USERNAME/front-app:latest .
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    - docker push docker.io/$DOCKERHUB_USERNAME/front-app:latest
    - docker images
  only:
    - main

#####################################
# Déploiement sur FRONT1
#####################################
deploy_front1:
  stage: deploy
  image: docker:20.10.16           # Image contenant la CLI Docker (basée sur Alpine)
  services:
    - name: docker:dind
      alias: docker                # Pour que le nom "docker" soit résolu
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - apk add --no-cache openssh-client sshpass
    - echo "$SSH_PRIVATE_KEY" > id_rsa
    - chmod 600 id_rsa
    - echo "$SSH_KNOWN_HOSTS" > known_hosts
    # Ajoute la clé SSH de FRONT1 (IP_FRONT_1 doit être défini avec l'adresse IP accessible)
    - if [ -n "$IP_FRONT_1" ]; then ssh-keyscan -t ed25519 $IP_FRONT_1 >> known_hosts; else echo "IP_FRONT_1 is not set"; fi
  script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
    # Récupération de l'image depuis Docker Hub
    - docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest
    # Connexion SSH sur FRONT1 pour déployer via docker-compose
    - >
      ssh -i id_rsa -o UserKnownHostsFile=known_hosts -o StrictHostKeyChecking=yes $SSH_USER@$IP_FRONT_1 "
        docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD &&
        docker pull docker.io/$DOCKERHUB_USERNAME/front-app:latest &&
        docker compose -f /srv/front/docker-compose.prod.yml down &&
        docker compose -f /srv/front/docker-compose.prod.yml up -d
      "
  only:
    - main