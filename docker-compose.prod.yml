services:
  frontend:
    container_name: infiswap_frontend
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - infiswap_network

networks:
  infiswap_network:
    driver: bridge
